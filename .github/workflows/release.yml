name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release Extension
    #if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: murar8/gnome-extensions-action@0.1.1
        id: package
        with:
          # per man gnome-extensions, pack default includes extension.js, metadata.json, stylesheets.css, prefs.js and schemas in schemas/
          extra-source: |
            camera-monitor-helper.js
            cameraMonitor.js
            indicator.js
            prereqs.js
            process.js
            sysfs.js
            v4l2.js
            README.md
            LICENSE
      - uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.package.outputs.zip-file }}
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.package.outputs.zip-file }}

